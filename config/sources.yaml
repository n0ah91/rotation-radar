# Curated Sources Configuration
# Adjust weights based on source quality and your preferences

reddit:
  subreddits:
    # High-signal retail sentiment
    - name: wallstreetbets
      weight: 1.0
      category: retail_momentum
      description: "High volume, early meme detection, noisy but important"

    - name: investing
      weight: 0.9
      category: general
      description: "More thoughtful, longer-term focus"

    - name: stocks
      weight: 0.8
      category: general
      description: "General stock discussion"

    - name: options
      weight: 0.7
      category: derivatives
      description: "Options flow and sentiment"

    # Sector-specific (higher weight = more trusted for that sector)
    - name: uraniumsqueeze
      weight: 1.5
      category: nuclear
      description: "Nuclear/uranium focused, early signals"

    - name: spacex
      weight: 1.2
      category: space
      description: "Space industry discussion"

    - name: energy
      weight: 0.9
      category: energy
      description: "Broad energy sector"

    - name: semiconductor
      weight: 1.0
      category: tech
      description: "Chip industry discussion"

    # Speculative (lower weight)
    - name: pennystocks
      weight: 0.5
      category: speculative
      description: "Small caps, higher noise"

    - name: spacs
      weight: 0.6
      category: speculative
      description: "SPAC-focused discussion"

youtube:
  channels:
    # Finance/investing channels
    - handle: "@InvestAnswers"
      weight: 1.2
      category: macro
      description: "Data-driven macro analysis"

    - handle: "@TheChartGuys"
      weight: 1.0
      category: technical
      description: "Technical analysis focus"

    - handle: "@GameofTrades"
      weight: 0.9
      category: macro
      description: "Macro perspectives"

