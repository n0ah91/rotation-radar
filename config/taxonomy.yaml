# Global keywords that map to multiple themes
global_keywords:
  bullish: ["buy", "buying", "long", "bullish", "moon", "rocket", "breakout", "adding", "loading"]
  bearish: ["sell", "short", "bearish", "dump", "crash", "puts", "exit"]
  uncertainty: ["maybe", "might", "could", "uncertain", "wait", "watching"]
  euphoria: ["🚀", "moon", "diamond hands", "YOLO", "all in", "can't lose", "free money"]

# Catalyst types for classification
catalyst_types:
  - policy: ["bill", "law", "regulation", "DOE", "EPA", "IRA", "administration"]
  - earnings: ["earnings", "revenue", "guidance", "beat", "miss", "EPS"]
  - contracts: ["contract", "award", "deal", "partnership", "acquisition"]
  - technical: ["breakout", "support", "resistance", "channel", "pattern"]
  - macro: ["Fed", "rates", "inflation", "GDP", "employment", "CPI"]
